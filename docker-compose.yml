services:
  bot:
    build:
      context: .
      dockerfile: ./bot/Dockerfile
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./bot:/app/bot

  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PGPORT}:5432"

volumes:
  postgres_data: